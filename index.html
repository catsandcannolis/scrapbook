<!doctype html>

<title>My Scrapbook</title>

<style>
body {
  background: #ffffff;
  color: #1a1a1a;
  font-family: "Courier New", Courier, monospace;
  margin: 0;
  padding: 40px;
  line-height: 1.6;
}

h1 {
  text-align: center;
  font-weight: normal;
  margin-bottom: 60px;
}

.entry {
  max-width: 900px;
  margin: 0 auto 70px auto;
  padding: 0 20px 40px 20px;
  border-bottom: 1px solid #e6e6e6;
}

.date {
  font-size: 13px;
  color: #666;
  margin-bottom: 10px;
  letter-spacing: 0.5px;
}

img {
  width: 100%;
  height: auto;
  margin-top: 12px;
  border-radius: 6px;
}

.caption {
  font-size: 12px;
  color: #777;
  font-style: italic;
  margin-top: 6px;
}

iframe {
  width: 100%;
  height: 315px;
  margin-top: 10px;
  border-radius: 6px;
}
  
.center-text {
  text-align: center;
}  
</style>

</head>
